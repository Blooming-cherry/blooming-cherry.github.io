name: Deploy Hexo Blog

on:
  push:
    branches:
      - main   # 或者你用来部署的分支

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 拉取仓库（包含子模块）
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true   # 关键：自动拉取 NexT 子模块
          fetch-depth: 0

      # 安装 Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # 安装依赖
      - name: Install dependencies
        run: npm ci

      # 构建 Hexo
      - name: Build Hexo
        run: npx hexo generate

      # 部署到 GitHub Pages
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
